name: Pitch Scout Daily Scraper

on:
  schedule:
    # Run 3x per day: 8am, 1pm, 6pm ET (12, 17, 22 UTC)
    - cron: '0 12 * * *'
    - cron: '0 17 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PUPPETEER_SKIP_DOWNLOAD: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=optional

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Run Scraper
        run: node scraper/engine.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'pitchscout-bot'
          git config --global user.email 'bot@pitchscout.local'
          git add src/data/mockState.json
          git diff --staged --quiet || git commit -m "chore: auto-update field schedules [skip ci]"
          git push
